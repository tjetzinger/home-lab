    - websecure
  routes:
    - match: Host(`studio.supabase.home.jetzinger.com`)
      kind: Rule
      services:
        - name: supabase-supabase-studio
          port: 3000
  tls:
    secretName: supabase-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supabase-studio-ingress-redirect
  namespace: backend
  labels:
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: supabase-studio-redirect
    app.kubernetes.io/part-of: home-lab
    app.kubernetes.io/managed-by: kubectl
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`studio.supabase.home.jetzinger.com`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: backend
      services:
        - name: supabase-supabase-studio
          port: 3000

---
# =============================================================================
# Part 4: auth.supabase → GoTrue Auth (port 9999)
# =============================================================================
# Direct access to GoTrue for health checks and debugging.
# Client SDKs access auth via Kong at api.supabase/auth/v1/*.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supabase-auth-ingress
  namespace: backend
  labels:
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: supabase-auth
    app.kubernetes.io/part-of: home-lab
    app.kubernetes.io/managed-by: kubectl
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.supabase.home.jetzinger.com`)
      kind: Rule
      services:
        - name: supabase-supabase-auth
          port: 9999
  tls:
    secretName: supabase-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supabase-auth-ingress-redirect
  namespace: backend
  labels:
    app.kubernetes.io/name: supabase
    app.kubernetes.io/instance: supabase-auth-redirect
    app.kubernetes.io/part-of: home-lab
    app.kubernetes.io/managed-by: kubectl
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`auth.supabase.home.jetzinger.com`)
      kind: Rule
      middlewares:
        - name: https-redirect
          namespace: backend
      services:
        - name: supabase-supabase-auth
          port: 9999

